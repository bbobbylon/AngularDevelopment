server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json application/xml image/svg+xml
                    font/woff2 font/woff;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options            "DENY"                            always;
    add_header X-Content-Type-Options     "nosniff"                         always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
        always;

    # ── Aggressive cache for content-hashed static assets ───────────────────
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback — every unknown path serves index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health-check endpoint (no logging) ───────────────────────────────────
    location /health {
        access_log  off;
        return      200 "ok";
        add_header  Content-Type text/plain;
    }
}
